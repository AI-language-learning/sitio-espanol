<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Vamos a aprender español!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fffdf8;
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  .site-header {
    text-align: center;
    padding: 2.5rem 1rem 1rem;
    border-bottom: 2px solid #c8501a;
  }

  .site-header img.logo {
    max-width: 560px;
    width: 90%;
    height: auto;
    display: block;
    margin: 0 auto 0.75rem;
    border-radius: 8px;
    box-shadow: 4px 6px 20px rgba(0, 0, 0, 0.20);
  }

  .site-header .subtitle {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1.5rem;
    padding-bottom: 1rem;
    flex-wrap: wrap;
  }

  .site-header .subtitle span {
    font-size: 13px;
    color: #888;
    letter-spacing: 0.08em;
  }

  .site-header .subtitle .divider {
    color: #c8501a;
    font-size: 16px;
  }

  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1.5rem;
  }

  .menu-card {
    display: block;
    text-decoration: none;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    box-shadow: 4px 6px 18px rgba(0, 0, 0, 0.18);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .menu-card:hover {
    transform: translateY(-5px);
    box-shadow: 6px 12px 28px rgba(0, 0, 0, 0.24);
  }

  .menu-card img {
    width: 100%;
    height: auto;
    display: block;
  }

  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 12px;
    color: #bbb;
    border-top: 1px solid #ece8e0;
  }

  @media (max-width: 500px) {
    .menu-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<header class="site-header">
  <img class="logo" src="menu_files/title_logo.png" alt="¡Vamos a aprender español!">
  <div class="subtitle">
    <span>Curso de español</span>
    <span class="divider">·</span>
    <span>スペイン語を楽しく覚えよう！</span>
  </div>
</header>

<main>
  <div class="menu-grid">
    <a class="menu-card" href="introduccion.html">
      <img src="menu_files/1.jpg" alt="スペイン語ってどんな言葉？">
    </a>
    <a class="menu-card" href="pronunciacion.html">
      <img src="menu_files/3.jpg" alt="スペイン語の発音">
    </a>
    <a class="menu-card" href="como_se_dice.html">
      <img src="menu_files/7.jpg" alt="何て言う？">
    </a>
  </div>
</main>

<footer>
  &copy; Grupo Moreral
</footer>

</body>
</html>
