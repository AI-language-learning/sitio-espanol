            <img usemap="#map1" id="shapeimage_3" src="sinopsis_files/shapeimage_3.png" style="border: none; height: 2535px; left: -10px; position: absolute; top: -5px; width: 561px; z-index: 1; " alt="●Profesor： 志柿光浩 Shigaki Mitsuhiro（国際文化研究科）&#13;&#13;●Oficina：国際文化研究科西棟３０３号室&#13;（保健管理センター・学生相談所の東側にある４階建ての建物です）&#13;&#13;●Teléfono / Fax ：022-795-7654（研究室直通）&#13;&#13;●Correo electrónico:　&#10;&#10;　mshigaki（アットマーク）m.tohoku.ac.jp&#10;　elprofesors（アットマーク）gmail.com&#13;&#10;（アットマーク）を@で置き換えてください。&#10;質問はe-mailでも受け付けます。欠席などの連絡もこちらへ。&#10;&#13;●Metas del Curso　授業の目標　　　詳しい目標はこちら&#13;&#13;・基本的なスペイン語コミュニケーション能力の獲得&#13;　　→　スペイン語圏に行った時に慌てずに済むように&#13;&#13;・スペイン語文化圏の人々について知る&#13;　　→　人々に対して共感を持って接していけるように&#13;&#13;・基本的な文法構造の理解・基本的語彙力の獲得&#13;・自発的学習能力の獲得&#13;　　→　将来，スペイン語を使っていけるように&#13;&#13;●Actividades en la clase　授業内容  &#13;&#13;・スペイン語教育用ビデオ教材¡Dime!を使用&#13;・文法の説明は最小限、口頭練習に重点&#13;・説明不十分な点は質問への回答で補足&#13;・録音教材を用いた聴解練習と筆記練習&#13;・語い力獲得のためのprueba (quiz)&#13;・聴解能力確認のためのdictado&#13;・スペイン語によるpresentaciónをビデオ収録し&#13;　　学習到達度を確認&#13;・ビデオや歌などでスペイン語圏の文化に接近&#13;&#13;●Materiales utilizados　教材 &#13;&#13;・かなりの枚数のプリントを配布しますので各自でファイルして活用してください。&#13;・録音教材も使いますが、これについては別途説明します。&#13;&#13;●Diccionario　辞書&#13;&#13;・オンライン英西・西英辞書を使いましょう&#10;　　 http://www.wordreference.com/　&#10;&#13;・電子辞書も役に立ちますので、購入する場合にはスペイン語辞書のあるものを選ぶといいでしょう。&#13;&#13;●Evaluación　評価方法：積算して下記の基準で成績を出します。&#13;&#13;・presentación oral オーラル・プレゼンテーション&#9;(0％〜＋30％)&#13;・prueba de vocabulario 語彙力テスト                         (0％〜＋25％)&#13;・dictado　聞き取りテスト&#9;&#9;　　                   (0％〜＋20％)&#13;・tareas 様々な課題&#9; &#9;&#9;                                   (0％〜＋15％)&#13;・auto-evaluación 自己評価                                           (0％〜＋10％)&#13;・asistencia 授業への出席　　　&#9;                           (-120%〜0％)&#13;&#13;遅刻５分まで -1％、５分以上 -2％、欠席 -4％。&#13;（遅刻した時は必ず授業終了後に報告してください。）　&#13;&#13;・prueba de vocabulario 語彙力テスト&#9;&#13;・dictado　聞き取りテスト&#9;&#9;&#13;&#13;以上の小テストは各２０点満点です。９点以下は０点として記録します。&#13;&#13;●Escala de evaluación 評価スケール&#13;&#13;以上の評点を合計して、以下の基準で評価します。&#13;&#13;　　　   AA  ≧90% &#13;90%＞　A　≧80%&#13;80%＞　B　≧70%&#13;70%＞　C　≧60%&#13;60%＞ 　D&#13;&#13;&#13;●留意事項&#13;&#13;・サークル活動による「公欠」扱いはしません。いわゆる「公欠届」は受け取りませんので、その旨、顧問教師に伝えてください。（欠席した分の学習内容と評価のマイナス分については自分の責任で挽回してください。）&#10;&#10;・東北大学の規則にはどこにも「公欠」という言葉は出てきません。サークル活動による欠席を「公欠」とする根拠はどこにもないのだそうです。ですから「公欠届」という文書は、勝手に作っても、意味はないということを、そのことを知らない顧問教師に伝えてください。&#13;&#13;・病欠・事故・忌引の時は、メール、電話、口頭などでその旨を教師に伝えてください。届けた場合は欠席扱いにはなりません。&#13;&#13;・病欠・事故・忌引によって受けられなかった小テストは、申し出て、別の時間に必ず受けてください" title="" /><map name="map1" id="map1"><area href="metas.html" title="metas.html" onmouseover="IMmouseover('shapeimage_3', '0');" alt="metas.html" onmouseout="IMmouseout('shapeimage_3', '0');" shape="rect" coords="267, 386, 403, 416" /><area href="http://www.wordreference.com" title="http://www.wordreference.com" onmouseover="IMmouseover('shapeimage_3', '1');" alt="http://www.wordreference.com" onmouseout="IMmouseout('shapeimage_3', '1');" shape="rect" coords="48, 1252, 251, 1281" /></map><img style="height: 30px; left: 257px; position: absolute; top: 381px; width: 136px; " id="shapeimage_3_link_0" alt="shapeimage_3_link_0" src="sinopsis_files/shapeimage_3_link_0.png" /><img style="height: 29px; left: 38px; position: absolute; top: 1247px; width: 203px; " id="shapeimage_3_link_1" alt="shapeimage_3_link_1" src="sinopsis_files/shapeimage_3_link_1.png" />
